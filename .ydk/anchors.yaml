version: 1

anchors:
  - target:
      kind: file
      path: .ydk/graph.yaml
    node: C-003
    reason: Stores the current-state purpose graph used to evaluate pit's direction.

  - target:
      kind: file
      path: .ydk/anchors.yaml
    node: C-003
    reason: Maps pit files and state artifacts to current project purposes.

  - target:
      kind: file
      path: .pit/head
    node: F-001
    reason: Stores the currently selected prompt snapshot for the repo.

  - target:
      kind: filePattern
      path: .pit/prompts/*.yaml
    node: C-001
    reason: Stores prompt snapshots that can be compared across implementation attempts.

  - target:
      kind: file
      path: README.md
    node: M-001
    reason: Introduces pit as a lightweight prompt iteration tool.

  - target:
      kind: file
      path: package.json
    node: F-003
    reason: Defines the scripts used to run and verify the prompt tool.

  - target:
      kind: file
      path: src/cli.ts
    node: F-001
    reason: Provides the command interface for creating and inspecting prompt snapshots.

  - target:
      kind: file
      path: src/store.ts
    node: C-002
    reason: Persists prompt records and the selected prompt under repo-local .pit metadata.

  - target:
      kind: file
      path: src/types.ts
    node: C-001
    reason: Defines the prompt record shape written to YAML.

  - target:
      kind: file
      path: tests/pit.test.ts
    node: F-003
    reason: Verifies that the metadata store remains predictable as the project grows.
