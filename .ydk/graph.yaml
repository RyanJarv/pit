version: 1

nodes:
  - id: M-001
    type: mission
    title: Help contributors compare project-generating prompts
    statement: >
      pit exists so a maintainer can snapshot prompts, connect them to the
      git states they produced, and compare whether different prompts lead to
      better project implementations.

  - id: O-001
    type: outcome
    title: Contributors can understand which prompts produced useful results

  - id: C-001
    type: capability
    title: Store prompt snapshots with lightweight ancestry

  - id: C-002
    type: capability
    title: Connect prompt records to git repository state

  - id: C-003
    type: capability
    title: Compare prompt variants and their outcomes

  - id: F-001
    type: feature
    title: Add, list, show, and select prompt snapshots

  - id: F-002
    type: feature
    title: Record the implementation result for a prompt

  - id: F-003
    type: feature
    title: Keep pit metadata simple enough to inspect and edit

  - id: F-004
    type: feature
    title: Show differences between prompt snapshots

edges:
  - from: O-001
    to: M-001
    type: supports

  - from: C-001
    to: O-001
    type: supports

  - from: C-002
    to: O-001
    type: supports

  - from: C-003
    to: O-001
    type: supports

  - from: F-001
    to: C-001
    type: supports

  - from: F-002
    to: C-002
    type: supports

  - from: F-003
    to: C-001
    type: supports

  - from: F-004
    to: C-003
    type: supports
